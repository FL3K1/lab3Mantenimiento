name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Copiamos el .env.example para que Docker tenga las variables y no explote
    - name: Set up environment variables
      run: cp .env.example .env

    # Usamos "docker compose" (sin guion) que es el estándar moderno en GitHub
    - name: Set up Docker Compose
      run: docker compose up -d

    - name: Wait for database to be ready
      run: sleep 10

    - name: Install coverage
      run: docker compose exec -T web pip install coverage

    - name: Run tests with coverage
      run: |
        docker compose exec -T web coverage run manage.py test
        docker compose exec -T web coverage report -m --fail-under=80